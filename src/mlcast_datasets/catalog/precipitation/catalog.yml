plugins:
  source:
    - module: intake_xarray

sources:
  radklim_hourly:
    description: "RADKLIM Hourly Precipitation Data from Deutscher Wetterdienst (DWD), hosted on ECMWF S3"
    driver: zarr
    args:
      urlpath: "s3://mlcast-source-datasets/radklim/v0.1.1/hourly.zarr/"
      consolidated: true
      storage_options:
        anon: true
        endpoint_url: "https://object-store.os-api.cci2.ecmwf.int"

  radklim_5_minutes:
    description: "RADKLIM 5-Minute Precipitation Data from Deutscher Wetterdienst (DWD), hosted on ECMWF S3"
    driver: zarr
    args:
      urlpath: "s3://mlcast-source-datasets/radklim/v0.1.1/5_minutes.zarr/"
      consolidated: true
      storage_options:
        anon: true
        endpoint_url: "https://object-store.os-api.cci2.ecmwf.int"

  dmi_10_minutes:
    description : "DMI (Danmarks Meteorologiske Institute) 10-Minute radar reflectivity data "
    driver: zarr
    args:
      urlpath: "s3://mlcast-source-datasets/dmi/v0.1.1/dmi_10_minutes.zarr/"
      consolidated: true
      storage_options:
        anon: true
        endpoint_url: "https://object-store.os-api.cci2.ecmwf.int"

  it_dpc_sri_5min:
    description: "Italian Radar Surface Rainfall Intensity (SRI) from Dipartimento Protezione Civile (DPC), hosted on ECMWF S3"
    driver: zarr
    args:
      urlpath: "s3://mlcast-source-datasets/IT-DPC-SRI/v0.1.0/italian-radar-dpc-sri.zarr/"
      consolidated: true
      storage_options:
        anon: true
        endpoint_url: "https://object-store.os-api.cci2.ecmwf.int"

  uk_metoffice_5min:
    description: "UK Met Office C-band rain radar 1 km composite (5-min, OSGB 1 km), hosted on ECMWF S3"
    driver: zarr
    args:
      urlpath: "s3://mlcast-source-datasets/UK-METOFFICE-RADAR/v0.1.0/uk-metoffice-c-band-rain-radar.zarr/"
      consolidated: true
      storage_options:
        anon: true
        endpoint_url: "https://object-store.os-api.cci2.ecmwf.int"
